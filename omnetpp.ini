[General]
network = fooddelivery.FoodDeliveryNetwork
sim-time-limit = 300s

# ---------------------------------------------------------------------------
# Every StandardHost needs a UDP stack. GlobalArp removes ARP broadcast
# traffic, and the explicit addresses below (config.xml) put every
# communicating pair on its own direct link -> no flooding, clean animation.
# ---------------------------------------------------------------------------
**.hasUdp = true
**.arp.typename = "GlobalArp"
*.configurator.config = xmldoc("config.xml")

# Record an eventlog so you can open the Sequence Chart (matches the workflow).
record-eventlog = false

# ---------------------------------------------------------------------------
# Customer -> Dispatcher (10.0.1.2)
# ---------------------------------------------------------------------------
*.customer.numApps = 1
*.customer.app[0].typename = "CustomerApp"
*.customer.app[0].dispatcherAddress = "10.0.1.2"
*.customer.app[0].startTime = 1s
*.customer.app[0].sendInterval = exponential(5s)
*.customer.app[0].numOrders = -1          # set to 1 to watch a single clean order

# ---------------------------------------------------------------------------
# Dispatcher -> Restaurant (10.0.2.2) and -> Rider (10.0.3.2)
# ---------------------------------------------------------------------------
*.dispatcher.numApps = 1
*.dispatcher.app[0].typename = "DispatcherApp"
*.dispatcher.app[0].restaurantAddresses = "10.0.2.2"
*.dispatcher.app[0].riderAddresses = "10.0.3.2"

# ---------------------------------------------------------------------------
# Restaurant: prepares food, replies to the dispatcher (message source).
# ---------------------------------------------------------------------------
*.restaurant.numApps = 1
*.restaurant.app[0].typename = "RestaurantApp"
*.restaurant.app[0].prepTime = uniform(2s, 5s)

# ---------------------------------------------------------------------------
# Rider: delivers straight to the customer (10.0.4.2) over the direct link.
# ---------------------------------------------------------------------------
*.rider.numApps = 1
*.rider.app[0].typename = "RiderApp"
*.rider.app[0].deliveryTime = uniform(5s, 15s)
*.rider.app[0].customerAddress = "10.0.4.2"

# ---------------------------------------------------------------------------
**.scalar-recording = true
**.vector-recording = true


# Busier run: orders arrive faster.
[Config HighLoad]
*.customer.app[0].sendInterval = exponential(1.5s)
